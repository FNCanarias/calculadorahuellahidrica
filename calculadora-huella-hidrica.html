
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Calculadora de Huella Hídrica</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: auto; padding: 20px; }
    .card { padding: 20px; border: 1px solid #ccc; border-radius: 10px; margin-top: 20px; }
    .hidden { display: none; }
    button { padding: 10px 20px; margin-top: 20px; cursor: pointer; }
  </style>
</head>
<body>

<h2>Calculadora de Huella Hídrica</h2>
<div class="card" id="question-card">
  <div id="question-text">¿Cuántas personas viven en tu hogar?</div>
  <input type="number" id="answer-input" min="1" />
  <br>
  <button onclick="nextQuestion()">Siguiente</button>
</div>

<div class="card hidden" id="result-card">
  <h3>Resultado estimado:</h3>
  <p id="result-text"></p>
  <button onclick="restart()">Volver a empezar</button>
</div>

<script>
  const questions = [
    { text: "¿Cuántas personas viven en tu hogar?", type: "number", key: "personas" },
    { text: "¿Cuántas duchas toma cada persona por semana?", type: "number", key: "duchas" },
    { text: "¿Cuántos minutos dura cada ducha?", type: "number", key: "minutosDucha" },
    { text: "¿Cuántas veces lavas la ropa por semana?", type: "number", key: "lavadora" },
    { text: "¿Cuántas veces usas el lavavajillas por semana?", type: "number", key: "lavavajillas" }
  ];

  const respuestas = {};
  let currentQuestion = 0;

  function nextQuestion() {
    const input = document.getElementById("answer-input");
    const value = input.value;
    if (value === "") return alert("Por favor responde la pregunta.");

    const key = questions[currentQuestion].key;
    respuestas[key] = parseFloat(value);

    currentQuestion++;
    if (currentQuestion < questions.length) {
      mostrarPregunta();
    } else {
      calcularHuella();
    }
  }

  function mostrarPregunta() {
    const q = questions[currentQuestion];
    document.getElementById("question-text").innerText = q.text;
    const input = document.getElementById("answer-input");
    input.type = q.type;
    input.value = "";
  }

  function calcularHuella() {
    const { personas, duchas, minutosDucha, lavadora, lavavajillas } = respuestas;
    const aguaDucha = personas * duchas * minutosDucha * 9;
    const aguaLavadora = lavadora * 50;
    const aguaLavavajillas = lavavajillas * 12;

    const totalSemanal = aguaDucha + aguaLavadora + aguaLavavajillas;
    const totalAnual = totalSemanal * 52;

    document.getElementById("question-card").classList.add("hidden");
    document.getElementById("result-card").classList.remove("hidden");

    document.getElementById("result-text").innerText =
      `Tu consumo aproximado de agua es de ${Math.round(totalAnual)} litros por año.`;
  }

  function restart() {
    currentQuestion = 0;
    for (let key in respuestas) delete respuestas[key];
    mostrarPregunta();
    document.getElementById("question-card").classList.remove("hidden");
    document.getElementById("result-card").classList.add("hidden");
  }

  mostrarPregunta();
</script>

</body>
</html>
